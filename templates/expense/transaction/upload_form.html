{% extends "expense/base.html" %}

{% block content %}

<div class="container mt-4">

    <h3>Upload Receipt</h3>

    <form
        method="post"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

        {{ form.as_p }}

        <button
            class="btn btn-primary"
            type="submit"
        >
            Upload
        </button>

    </form>

</div>

{% endblock %}
